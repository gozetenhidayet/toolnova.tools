<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>toolnova.tools</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 320px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px;
  background: #f7f8fc;
  color: #1a1d2e;
}
.header {
  background: linear-gradient(135deg, #4f63d2 0%, #3d4fb8 100%);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo {
  font-size: 17px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -0.5px;
}
.logo span { color: #7dffda; }
.tagline { color: rgba(255,255,255,0.75); font-size: 11px; margin-top: 2px; }
.tools-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 12px;
}
.tool-btn {
  background: #fff;
  border: 1.5px solid #e2e5f0;
  border-radius: 10px;
  padding: 10px 8px;
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
  text-decoration: none;
  display: block;
}
.tool-btn:hover {
  border-color: #4f63d2;
  background: #eef0fd;
  transform: translateY(-1px);
}
.tool-icon { font-size: 18px; margin-bottom: 4px; }
.tool-name { font-size: 11px; font-weight: 600; color: #1a1d2e; }
.footer {
  border-top: 1px solid #e2e5f0;
  padding: 10px 12px;
  text-align: center;
}
.footer a {
  color: #4f63d2;
  text-decoration: none;
  font-size: 11px;
  font-weight: 600;
}
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="logo">toolnova<span>.tools</span></div>
    <div class="tagline">Free online tools — no signup needed</div>
  </div>
</div>

<div class="tools-grid">
  <a class="tool-btn" href="https://toolnova.tools/qr-code-generator.html" target="_blank">
    <div class="tool-icon">📱</div>
    <div class="tool-name">QR Code Generator</div>
  </a>
  <a class="tool-btn" href="https://toolnova.tools/age-calculator.html" target="_blank">
    <div class="tool-icon">🎂</div>
    <div class="tool-name">Age Calculator</div>
  </a>
  <a class="tool-btn" href="https://toolnova.tools/bmi-calculator.html" target="_blank">
    <div class="tool-icon">⚖️</div>
    <div class="tool-name">BMI Calculator</div>
  </a>
  <a class="tool-btn" href="https://toolnova.tools/currency-converter.html" target="_blank">
    <div class="tool-icon">💱</div>
    <div class="tool-name">Currency Converter</div>
  </a>
  <a class="tool-btn" href="https://toolnova.tools/password-generator.html" target="_blank">
    <div class="tool-icon">🔐</div>
    <div class="tool-name">Password Generator</div>
  </a>
  <a class="tool-btn" href="https://toolnova.tools/word-counter.html" target="_blank">
    <div class="tool-icon">📝</div>
    <div class="tool-name">Word Counter</div>
  </a>
  <a class="tool-btn" href="https://toolnova.tools/tip-calculator.html" target="_blank">
    <div class="tool-icon">🍽️</div>
    <div class="tool-name">Tip Calculator</div>
  </a>
  <a class="tool-btn" href="https://toolnova.tools/unit-converter.html" target="_blank">
    <div class="tool-icon">📏</div>
    <div class="tool-name">Unit Converter</div>
  </a>
  <a class="tool-btn" href="https://toolnova.tools/loan-calculator.html" target="_blank">
    <div class="tool-icon">🏦</div>
    <div class="tool-name">Loan Calculator</div>
  </a>
  <a class="tool-btn" href="https://toolnova.tools/discount-calculator.html" target="_blank">
    <div class="tool-icon">🏷️</div>
    <div class="tool-name">Discount Calculator</div>
  </a>
  <a class="tool-btn" href="https://toolnova.tools/color-code-converter.html" target="_blank">
    <div class="tool-icon">🎨</div>
    <div class="tool-name">Color Converter</div>
  </a>
  <a class="tool-btn" href="https://toolnova.tools/text-case-converter.html" target="_blank">
    <div class="tool-icon">🔤</div>
    <div class="tool-name">Text Case</div>
  </a>
</div>

<div class="footer">
  <a href="https://toolnova.tools" target="_blank">🌐 Open toolnova.tools</a>
</div>
</body>
</html>
